<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.c360a.salesforce.com/beacon/c360a/c9671114-d0a7-4e57-a3f5-be9a1bd09faf/scripts/c360a.min.js"></script>
    <title>Simple Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex; 
            justify-content: center; 
            align-items: center;  
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Register</h2>
    <form id="test-form">
        <input type="text" name="fullName" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <textarea placeholder="Address" name="address" required></textarea>
        <button type="submit">Sign Up</button>
    </form>
    <div class="footer">
        Already have an account? Login
    </div>
</div>
</body>
    <script>
    document.getElementById('test-form').addEventListener("submit", (e) => {
        e.preventDefault();
    });

    SalesforceInteractions.Personalization.fetch(["test_2", "home_hero"])
      .then((personalizationResponse) => { 
        // Custom logic to render personalization on the website
        console.log("Personalization Response", personalizationResponse);
      });
    </script>
</html>
